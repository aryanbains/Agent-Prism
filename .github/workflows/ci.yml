name: CI

on:
  push:
  pull_request:

jobs:
  node:
    name: Node, dashboard, and browser tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: npx playwright install chromium --with-deps
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run test:e2e
      - run: npm run benchmark
      - run: npm pack -w agent-prism --dry-run

  python:
    name: Python package tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "packages/agent-prism-py[test]"
      - run: python -m pytest packages/agent-prism-py/tests